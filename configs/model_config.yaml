data:
  raw_path: "data/raw/telco_churn.csv"
  processed_dir: "data/processed"
  test_size: 0.2
  random_state: 42

features:
  target: "Churn"
  drop_columns: ["customerID"]
  numeric_features:
    - tenure
    - MonthlyCharges
    - TotalCharges
  categorical_features:
    - gender
    - SeniorCitizen
    - Partner
    - Dependents
    - PhoneService
    - MultipleLines
    - InternetService
    - OnlineSecurity
    - OnlineBackup
    - DeviceProtection
    - TechSupport
    - StreamingTV
    - StreamingMovies
    - Contract
    - PaperlessBilling
    - PaymentMethod

training:
  models:
    - logistic_regression
    - random_forest
    - gradient_boosting
  cv_folds: 5
  scoring: "average_precision"

evaluation:
  threshold_metric: "f1"
  figures_dir: "outputs/figures"
  reports_dir: "outputs/reports"

mlflow:
  experiment_name: "churn-prediction"
  tracking_uri: "http://localhost:5001"
  registered_model_name: "churn-classifier"

api:
  model_path: "outputs/models/best_model.joblib"
  pipeline_path: "outputs/models/preprocessing_pipeline.joblib"